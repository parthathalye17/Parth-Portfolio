:root {

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--f-black);color:#fff;font-family:var(--ff-b);-webkit-font-smoothing:antialiased;overflow-x:hidden;cursor:none}
a{color:inherit;text-decoration:none}
button{font-family:var(--ff-b);border:none;background:none;padding:0;cursor:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:#333}

/* Cursor — mix-blend-mode:difference makes it auto-invert on white sections */
#cd{position:fixed;width:7px;height:7px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cr{position:fixed;width:34px;height:34px;border:1.5px solid #fff;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width 300ms,height 300ms}
body.ch #cr{width:50px;height:50px}

/* Scroll reveal */
.rv{opacity:0;transform:perspective(900px) translateY(32px) rotateX(4deg);transition:opacity 850ms var(--ease),transform 850ms var(--ease)}
.rv.in{opacity:1;transform:none}
.rv.d1{transition-delay:110ms}.rv.d2{transition-delay:220ms}.rv.d3{transition-delay:330ms}.rv.d4{transition-delay:440ms}

/* Noise overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

@keyframes letterIn{0%{opacity:0;transform:rotateX(-90deg) translateZ(-20px);filter:blur(3px)}55%{filter:blur(0)}100%{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes lineDrop{from{transform:scaleY(0);transform-origin:top}to{transform:scaleY(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}

/* Video modal */
#vmodal{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.92);align-items:center;justify-content:center}
#vmodal.open{display:flex}
#vmodal-inner{position:relative;width:min(900px,92vw);animation:modalIn 280ms var(--ease) both}
#vmodal-close{position:absolute;top:-38px;right:0;font-family:var(--ff-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.45);background:none;border:none;cursor:pointer;cursor:none}
#vmodal iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:2px}
</style>

<script>
var cd=document.getElementById('cd'),cr=document.getElementById('cr');
var mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px'},{passive:true});
(function t(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(t)})();
function setupH(){document.querySelectorAll('[data-h]').forEach(function(el){el.addEventListener('mouseenter',function(){document.body.classList.add('ch');});el.addEventListener('mouseleave',function(){document.body.classList.remove('ch');});})}
var sio=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in')});},{threshold:0.07});
function initR(){document.querySelectorAll('.rv:not(.in)').forEach(function(el){sio.observe(el)})}
setTimeout(function(){initR();setupH()},250);
new MutationObserver(function(){initR();setupH()}).observe(document.body,{childList:true,subtree:true});

function openVideo(ytId){
  var m=document.getElementById('vmodal');
  document.getElementById('vmodal-frame').src='https://www.youtube.com/embed/'+ytId+'?autoplay=1';
  m.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeVideo(){
  document.getElementById('vmodal').classList.remove('open');
  document.getElementById('vmodal-frame').src='';
  document.body.style.overflow='';
}
document.getElementById('vmodal').addEventListener('click',function(e){if(e.target===this)closeVideo();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVideo();});
</script>

/* ── 3D SPHERE CANVAS ── */
function SphereCanvas(){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    let W,H,raf;
    function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
    resize();
    window.addEventListener('resize',resize,{passive:true});
    const N=260;
    const pts=[];
    const PHI=Math.PI*(1+Math.sqrt(5));
    for(let i=0;i<N;i++){
      const phi=Math.acos(1-2*(i+0.5)/N);
      const theta=PHI*i;
      pts.push({ox:Math.sin(phi)*Math.cos(theta),oy:Math.cos(phi),oz:Math.sin(phi)*Math.sin(theta)});
    }
    let mX=0,mY=0,tmX=0,tmY=0;
    function onMove(e){mX=(e.clientX/window.innerWidth-.5)*.18;mY=(e.clientY/window.innerHeight-.5)*.12;}
    window.addEventListener('mousemove',onMove,{passive:true});
    let rotY=0;
    const BASE_X=0.28;
    function render(){
      W=canvas.width;H=canvas.height;
      const r=Math.min(W,H)*0.72;
      ctx.clearRect(0,0,W,H);
      rotY+=0.0012;
      tmX+=(mX-tmX)*.02;tmY+=(mY-tmY)*.02;
      const rX=BASE_X+tmY,rY=rotY+tmX;
      const cosY=Math.cos(rY),sinY=Math.sin(rY),cosX=Math.cos(rX),sinX=Math.sin(rX);
      const FOV=W*0.9,cx=W/2,cy=H/2;
      const proj=pts.map(p=>{
        const x1=p.ox*cosY+p.oz*sinY,z1=-p.ox*sinY+p.oz*cosY;
        const y2=p.oy*cosX-z1*sinX,z2=p.oy*sinX+z1*cosX;
        const scale=FOV/(z2*r+FOV+r*0.5);
        return{sx:x1*r*scale+cx,sy:y2*r*scale+cy,z:z2,sc:scale};
      });
      proj.sort((a,b)=>a.z-b.z);
      const THRESH=r*0.22,THRESH2=THRESH*THRESH;
      for(let i=0;i<proj.length;i++){
        for(let j=i+1;j<proj.length;j++){
          const dx=proj[i].sx-proj[j].sx,dy=proj[i].sy-proj[j].sy,d2=dx*dx+dy*dy;
          if(d2<THRESH2){
            const t=1-Math.sqrt(d2)/THRESH;
            const avgZ=(proj[i].z+proj[j].z)*0.5,depthFade=(avgZ+1)*0.5;
            const alpha=t*t*(0.04+depthFade*0.045);
            ctx.strokeStyle=`rgba(255,255,255,${alpha.toFixed(3)})`;
            ctx.lineWidth=0.6;
            ctx.beginPath();ctx.moveTo(proj[i].sx,proj[i].sy);ctx.lineTo(proj[j].sx,proj[j].sy);ctx.stroke();
          }
        }
      }
      proj.forEach(p=>{
        const depthFade=(p.z+1)*0.5;
        const alpha=0.05+depthFade*0.12,size=0.6+depthFade*1.6;
        ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(3)})`;
        ctx.beginPath();ctx.arc(p.sx,p.sy,size,0,Math.PI*2);ctx.fill();
      });
      raf=requestAnimationFrame(render);
    }
    render();
    return()=>{window.removeEventListener('resize',resize);window.removeEventListener('mousemove',onMove);cancelAnimationFrame(raf);};
  },[]);
  return(
    <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1,display:'block'}}/>
  );
}

/* ── PROJECTS — black ── */
function ProjectRow({p}){
  const[open,setOpen]=useState(false);
  const[hov,setHov]=useState(false);
  const rowRef=useRef(null);
  function onMove(e){
    if(!rowRef.current)return;
    const r=rowRef.current.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;
    rowRef.current.style.transform=`perspective(1100px) rotateY(${x*3}deg) rotateX(${-y*1.5}deg)`;
    rowRef.current.style.transition='transform 80ms linear';
  }
  function onLeave(){
    setHov(false);if(!rowRef.current)return;
    rowRef.current.style.transform='perspective(1100px) rotateY(0) rotateX(0)';
    rowRef.current.style.transition='transform 800ms cubic-bezier(0.34,1.56,0.64,1)';
  }
  const thumbUrl=`https://img.youtube.com/vi/${p.ytId}/mqdefault.jpg`;
  return(
    <div ref={rowRef} data-h="true" onClick={()=>setOpen(o=>!o)}
      onMouseMove={onMove} onMouseLeave={onLeave} onMouseEnter={()=>setHov(true)}
      style={{borderTop:`1px solid ${hov?'rgba(255,255,255,0.14)':'rgba(255,255,255,0.07)'}`,
        padding:`${open?30:20}px 0`,transition:'padding 320ms var(--ease),border-color 200ms',
        willChange:'transform',cursor:'pointer'}}>
      <div style={{display:'grid',gridTemplateColumns:'48px 1fr 60px 24px',gap:20,alignItems:'start'}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:'.5px',paddingTop:4,
          color:hov?'rgba(255,255,255,0.35)':'rgba(255,255,255,0.14)',transition:'color 200ms'}}>{p.n}</span>
        <div>
          <div style={{marginBottom:3}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'clamp(20px,2.4vw,28px)',fontWeight:700,
              letterSpacing:'-0.01em',color:hov?'#fff':'rgba(255,255,255,0.88)',transition:'color 200ms',
              display:'block',lineHeight:1.1}}>{p.title}</span>
            <span style={{fontFamily:"'Barlow',sans-serif",fontSize:13,fontWeight:300,
              color:'rgba(255,255,255,0.26)',display:'block',marginTop:3}}>{p.sub}</span>
          </div>
          {open&&(
            <div style={{marginTop:16,animation:'slideDown 360ms var(--ease) both'}}>
              {/* YouTube thumbnail */}
              <div style={{marginBottom:16,position:'relative',display:'inline-block',cursor:'pointer'}}
                onClick={e=>{e.stopPropagation();openVideo(p.ytId);}}>
                <img src={thumbUrl} alt={p.title+' demo'}
                  style={{width:240,height:135,objectFit:'cover',borderRadius:2,display:'block',border:'1px solid rgba(255,255,255,0.1)'}}/>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
                  background:'rgba(0,0,0,0.35)',borderRadius:2,transition:'background 200ms'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(0,0,0,0.18)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(0,0,0,0.35)'}>
                  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <circle cx="18" cy="18" r="17" stroke="rgba(255,255,255,0.7)" strokeWidth="1.2"/>
                    <path d="M15 12.5l9 5.5-9 5.5V12.5z" fill="#fff"/>
                  </svg>
                </div>
              </div>
              <p style={{fontFamily:"'Barlow',sans-serif",fontSize:14,fontWeight:300,color:'rgba(255,255,255,0.42)',lineHeight:1.82,maxWidth:600,marginBottom:16}}>{p.desc}</p>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
                {p.stack.map(t=>(
                  <span key={t} style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'.5px',padding:'4px 10px',border:'1px solid rgba(255,255,255,0.13)',borderRadius:'var(--r)',color:'rgba(255,255,255,0.38)'}}>{t}</span>
                ))}
              </div>
              <a href={p.link} target="_blank" data-h="true" onClick={e=>e.stopPropagation()}
                style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'1px',textTransform:'uppercase',color:'rgba(255,255,255,0.38)',borderBottom:'1px solid rgba(255,255,255,0.16)',paddingBottom:2,transition:'color 200ms,border-color 200ms'}}
                onMouseEnter={e=>{e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor='rgba(255,255,255,0.55)'}}
                onMouseLeave={e=>{e.currentTarget.style.color='rgba(255,255,255,0.38)';e.currentTarget.style.borderColor='rgba(255,255,255,0.16)'}}>
                View Repository ↗
              </a>
            </div>
          )}
        </div>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,0.18)',textAlign:'right',paddingTop:4}}>{p.year}</span>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{color:'rgba(255,255,255,0.2)',transform:hov?'translate(2px,-2px)':'none',transition:'transform 260ms cubic-bezier(0.34,1.56,0.64,1)',marginTop:4}}>
          <path d="M3 13L13 3M13 3H6M13 3V10" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    </div>
  );
}

            </h2>

                borderBottom:'1px solid rgba(255,255,255,0.06)',

                <span style={{fontFamily:"'Barlow',sans-serif",fontSize:14,fontWeight:400,
                  color:f.accent?'rgba(218,41,28,0.85)':'rgba(255,255,255,0.62)',transition:'color 200ms'}}
                  onMouseEnter={f.href?e=>e.currentTarget.style.color='#fff':undefined}

/* ── APP ── */
function App(){
  function goTo(id){
    if(id==='hero'){window.scrollTo({top:0,behavior:'smooth'});return;}
    const el=document.getElementById(id);
    if(el){const top=el.getBoundingClientRect().top+window.scrollY-56;window.scrollTo({top,behavior:'smooth'});}
  }
  return(
    <div>
      <Nav onNav={goTo}/>
      <Hero/>
      <About/>
      <Experience/>
      <Projects/>
      <Contact/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
